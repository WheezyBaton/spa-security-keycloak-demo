#k8s/keycloak-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
      name: keycloak
spec:
      replicas: 1
      selector:
            matchLabels:
                  app: keycloak
      template:
            metadata:
                  labels:
                        app: keycloak
            spec:
                  containers:
                        - name: keycloak
                          image: quay.io/keycloak/keycloak:22.0.5
                          args: ["start-dev", "--import-realm"]
                          env:
                                - name: KEYCLOAK_ADMIN
                                  value: "admin"
                                - name: KEYCLOAK_ADMIN_PASSWORD
                                  value: "admin"
                                - name: KC_PROXY
                                  value: "edge"
                          ports:
                                - containerPort: 8080
                          volumeMounts:
                                - name: realm-config
                                  mountPath: /opt/keycloak/data/import/realm-export.json
                                  subPath: realm-export.json
                          resources:
                                limits:
                                      memory: "512Mi"
                                      cpu: "1000m"
                                requests:
                                      memory: "256Mi"
                                      cpu: "500m"
                  volumes:
                        - name: realm-config
                          configMap:
                                name: keycloak-realm-config
